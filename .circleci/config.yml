version: 2.1

jobs:
  smoke-tests:
    docker:
      - image: cimg/node:22.11-browsers
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-cache-v1-{{ checksum "package-lock.json" }}
            - npm-cache-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-cache-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
            - ~/.cache/Cypress
      - run:
          name: Verify Cypress binary
          command: npm run cy:verify
      - run:
          name: Run smoke tests
          command: npm run test:smoke
      - store_test_results:
          path: reports/junit
      - store_artifacts:
          path: reports
          destination: reports
      - store_artifacts:
          path: cypress/screenshots
          destination: screenshots
      - store_artifacts:
          path: cypress/videos
          destination: videos

  regression-tests:
    docker:
      - image: cimg/node:22.11-browsers
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-cache-v1-{{ checksum "package-lock.json" }}
            - npm-cache-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-cache-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
            - ~/.cache/Cypress
      - run:
          name: Verify Cypress binary
          command: npm run cy:verify
      - run:
          name: Run regression tests
          command: npm run test:regression
      - store_test_results:
          path: reports/junit
      - store_artifacts:
          path: reports
          destination: reports
      - store_artifacts:
          path: cypress/screenshots
          destination: screenshots
      - store_artifacts:
          path: cypress/videos
          destination: videos

workflows:
  cypress-quality-gates:
    jobs:
      - smoke-tests
      - regression-tests:
          requires:
            - smoke-tests
          filters:
            branches:
              only:
                - main